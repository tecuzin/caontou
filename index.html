<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0" />
    <meta name="theme-color" content="#4a5d3a" />
    <meta name="description" content="Cantou — l'app du séjour familial dans le Cantal (Carladès) : planning, visites, repas, budget, checklists et souvenirs, 100 % hors ligne." />
    <title>Cantou — Vacances Cantal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body { background: #f4ecdc; font-family: 'Nunito Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
      #app { height: 100%; }
      /* color: inherit — sinon boutons/champs utilisent le noir UA par défaut,
         illisible sur fond sombre (les titres de cartes et le JSON export/import
         héritent alors du texte thémé clair de la racine en mode sombre). */
      button { font-family: inherit; color: inherit; }
      input, textarea { font-family: inherit; outline: none; color: inherit; }
      ::-webkit-scrollbar { width: 0; height: 0; }
      @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      /* Micro-animations (lot UI polish) : transition douce entre écrans +
         retour visuel à l'appui des boutons. Coupées si l'utilisateur préfère
         moins de mouvement (accessibilité). */
      @keyframes screenIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
      .screen-in { animation: screenIn 0.18s ease-out; }
      button { transition: transform 0.08s ease, opacity 0.08s ease; }
      button:active { transform: scale(0.96); }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
      }
      body.dark { background: #1c1a16; }
    </style>
    <script>
      // Anti-flash : applique le fond sombre avant même le montage React,
      // pour éviter un flash clair au démarrage si le mode sombre est actif.
      try {
        var saved = localStorage.getItem('cantou.darkMode')
        var dark = saved !== null ? saved === 'true' : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)
        if (dark) document.body.classList.add('dark')
      } catch (e) {}
    </script>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
